<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--日程任务进度记录管理界面-->
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
    <title>日程任务进度记录管理</title>
    <link rel="shortcut icon" href="../static/img/favicon.jpg">
    <!--css资源引用-->
    <link rel="stylesheet" href="../static/element-ui/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <!--js资源引用-->
    <script type="text/javascript">
        var html = document.getElementsByTagName("html")[0];
        var w = document.documentElement.clientWidth || document.body.clientWidth;
        html.style.fontSize = w / 1366 + "px";
    </script>
    <script src="../static/js/vue.js"></script>
    <script src="../static/element-ui/lib/index.js"></script>
    <script src="../static/js/jquery-2.2.3.min.js"></script>
    <script src="../static/js/elementUI_icon.js"></script>
    <!--验证规则-->
    <script src="../static/js/elementui_validator.js"></script>
    <!--富文本资源文件-->
    <script type="text/javascript" charset="utf-8" src="../static/ueditor.config.js"></script>
    <script type="text/javascript" charset="utf-8" src="../static/ueditor.all.min.js"></script>
</head>
<body>
<div id="cus_IndexApp" v-cloak>
    <!--顶部搜索区功能按钮-->
    <div class="admin-page-toolbar">
        <el-button size="mini" @click="add" v-if="name_add" icon="el-icon-circle-plus-outline" class="table-button-add">
            新增
        </el-button>
        <el-select placeholder="请选择提交人" v-model="soMoreUserIpt.user_id" size="mini" class="top_divR" clearable>
            <el-option
                    v-for="item in classOptionsuser_id"
                    :key="item.id"
                    :label="item.nickname || item.username"
                    :value="String(item.id)">
            </el-option>
        </el-select>
        <el-button size="mini" @click="handleCurrentChange(1)" v-if="name_query" icon="el-icon-search"
                   class="table-button-search">搜索
        </el-button>
    </div>
    <!--列表数据展示区-->
    <div class="cusMTable">
        <el-table :data="cusTableLstInit" style="width: 100%;" stripe header-row-class-name="header-row-class-name">
            <el-table-column
                    prop="id"
                    label="主键id">
            </el-table-column>
            <el-table-column
                    prop="task_id"
                    label="任务ID">
            </el-table-column>
            <el-table-column
                    prop="user_id"
                    label="提交人ID">
                <template slot-scope="scope">
                    <el-tag type="success">{{scope.row.user_id_USERNAME1}}</el-tag>
                </template>
            </el-table-column>
            <el-table-column
                    prop="progress"
                    label="进度状态">
                <template slot-scope="scope">
                    <el-tag :type="progressTagType(scope.row.progress)">{{progressText(scope.row.progress)}}</el-tag>
                </template>
            </el-table-column>
            <el-table-column
                    prop="submit_time"
                    label="提交时间">
            </el-table-column>
            <el-table-column fixed="right" label="操作" min-width="190" width="230">
                <template slot-scope="scope">
                    <div class="operation-buttons">
                        <el-button @click="view(scope.row)" class="table-button-view operation-btn" icon="el-icon-view" size="mini">
                            查看
                        </el-button>
                        <el-button @click="edit(scope.row)" class="table-button-edit operation-btn" icon="el-icon-edit" size="mini"
                                   v-if="name_edit">编辑
                        </el-button>
                        <el-button @click="del(scope.row)" class="table-button-delete operation-btn" icon="el-icon-delete" size="mini"
                                   v-if="name_delete">删除
                        </el-button>
                    </div>
                </template>
            </el-table-column>
        </el-table>
        <div style="text-align:right;">
            <el-pagination @current-change="handleCurrentChange" :current-page="pageInit.currentPage" :page-size="10"
                           layout="total, prev, pager, next, jumper" :total="pageInit.totalResult">
            </el-pagination>
        </div>
    </div>
    <!--新增、编辑、详情dialog界面-->
    <el-dialog :title="titleName" :visible.sync="addNewCustomer" width="60%" top="5vh">
        <el-form :model="ruleForm" ref="ruleForm" label-width="100px" class="demo-ruleForm" :rules="rules"
                 :disabled="viewDisabled">
            <el-form-item label="任务ID" prop="task_id">
                <el-input v-model="ruleForm.task_id"></el-input>
            </el-form-item>
            <el-form-item label="提交人" prop="user_id">
                <el-select v-model="ruleForm.user_id" placeholder="请选择提交人" filterable clearable :disabled="isPersonalUser">
                    <el-option
                            v-for="item in classOptionsuser_id"
                            :key="item.id"
                            :label="item.nickname || item.username"
                            :value="String(item.id)">
                    </el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="进度状态" prop="progress">
                <el-select v-model="ruleForm.progress" placeholder="请选择进度状态">
                    <el-option label="未开始" value="0"></el-option>
                    <el-option label="进行中" value="1"></el-option>
                    <el-option label="已完成" value="2"></el-option>
                </el-select>
            </el-form-item>
            <el-form-item label="进度描述" prop="content">
                <el-input type="textarea" v-model="ruleForm.content" auto></el-input>
            </el-form-item>
            <el-form-item label="提交时间" prop="submit_time">
                <el-date-picker
                        v-model="ruleForm.submit_time"
                        type="date"
                        placeholder="选择日期"
                        format="yyyy 年 MM 月 dd 日"
                        value-format="yyyy-MM-dd">
                </el-date-picker>
            </el-form-item>
            <el-form-item v-if="!viewDisabled">
                <el-button type="primary" style="margin-left:35%" @click="submitForm">立即保存</el-button>
            </el-form-item>
        </el-form>
    </el-dialog>
</div>
</body>
<script th:inline="javascript">
    var test_detailsue = null;
    var test_detailsue;
    var ue = null;
    var basePath = "/" + window.location.pathname.split("/")[1];
    let app = window.parent.App;
    <!--使用vue-->
    new Vue({
        el: "#cus_IndexApp",
        <!--初始化 data -->
        data() {
            return {
                pageInit: {
                    currentPage: 1,
                },
                cusTableLstInit: [],
                soMoreUserIpt: {},
                addNewCustomer: false,
                ruleForm: {},
                rules: {
                    id: [
                        {required: false, message: '请填写主键id', trigger: 'blur'}
                    ],
                    task_id: [
                        {required: false, message: '请填写任务ID', trigger: 'blur'}
                    ],
                    user_id: [
                        {required: true, message: '请选择提交人', trigger: 'change'}
                    ],
                    progress: [
                        {required: true, message: '请选择进度状态', trigger: 'change'}
                    ],
                    content: [
                        {required: false, message: '请填写进度描述', trigger: 'blur'}
                    ],
                    submit_time: [
                        {required: false, message: '请填写提交时间', trigger: 'change'}
                    ],
                },
                viewDisabled: false,
                titleName: "新增",
                classOptionsuser_id: [],
                classOptions: [],
                userObj: [],
                name_add: false,//新增权限
                name_edit: false,//编辑权限
                name_delete: false,//删除权限
                name_query: false,//查询权限
                tenantList: [],
                uploadUrl: basePath,
                iconList: iconList,
                isPersonalUser: false,
            }
        },
        <!--初始化 mounted -->
        mounted() {
            this.userObj = JSON.parse(localStorage.getItem("userInfo"));
            this.isPersonalUser = !!(this.userObj && this.userObj.login_user_type === 'personal');
            this.getUserBtnList(this.userObj.role_manage_id);//调用获取权限按钮
            this.handleCurrentChange(1);
            this.getClassOptionsuser_id();
        },
        <!--初始化 methods -->
        methods: {
//获取权限按钮方法
            getUserBtnList(role_manage_id) {
                var pram = new URLSearchParams('?' + window.location.href.split('?')[1]);
                var child_menu_id = pram.get('child_menu_id');
                let that = this;
//ajax发送请求
                $.ajax({
                    type: "GET",
                    url: basePath + "/permission_menu/queryPermission_menuKey",
                    data: {role_manage_id: role_manage_id, child_menu_id: child_menu_id},
                    success: function (res) {
                        let childMenu = res.data[0];
                        that.name_add = childMenu.name_add == '1'//新增权限
                        that.name_edit = childMenu.name_edit == '1'//编辑权限
                        that.name_delete = childMenu.name_delete == '1'//删除权限
                        that.name_query = childMenu.name_query == '1'//查询权限
                    }
                })
            },
            windowOpen(url) {
                window.open(url);
            },
            view(row) {
                this.titleName = "详情";
                this.ruleForm = row;
                this.viewDisabled = true;
                this.addNewCustomer = true;
                this.ruleForm.user_id = row.user_id ? String(row.user_id) : '';
                this.ruleForm.progress = row.progress ? String(row.progress) : '0';
            },
            add() {
                this.titleName = "新增";
                this.addNewCustomer = true;
                this.viewDisabled = false;
                this.ruleForm = {
                    task_id: '',
                    user_id: this.userObj && this.userObj.id ? String(this.userObj.id) : '',
                    progress: '0',
                    content: '',
                    submit_time: ''
                };
            },
            edit(row) {
                this.titleName = "编辑";
                this.ruleForm = row;
                this.addNewCustomer = true;
                this.viewDisabled = false;
                this.ruleForm.user_id = row.user_id ? String(row.user_id) : '';
                this.ruleForm.progress = row.progress ? String(row.progress) : '0';
            },
            getClassOptionsuser_id() {
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/app_user/queryApp_userKey`,
                    data: {},
                    success: function (data) {
                        that.classOptionsuser_id = data.data || [];
                    }
                })
            },
            progressText(v){
                var s = String(v == null ? '' : v);
                if(s === '0') return '未开始';
                if(s === '1') return '进行中';
                if(s === '2') return '已完成';
                return s || '-';
            },
            progressTagType(v){
                var s = String(v == null ? '' : v);
                if(s === '2') return 'success';
                if(s === '1') return 'warning';
                return 'info';
            },
            submitForm() {
                let that = this;
                if (this.isPersonalUser && this.userObj && this.userObj.id) {
                    this.ruleForm.user_id = String(this.userObj.id);
                }
                this.$refs.ruleForm.validate((valid) => {
                    if (valid) {
                        if (this.titleName == "新增") {
                            $.ajax({
                                type: "POST",
                                url: basePath + "/app_task_progress/addApp_task_progressNo",
                                data: that.ruleForm,
                                success: function (res) {
                                    console.log(res);
                                    if (res.status == 0) {
                                        that.addNewCustomer = false;
                                        that.handleCurrentChange(1);
                                    }
                                }
                            })
                        } else if (this.titleName == "编辑") {
                            $.ajax({
                                type: "POST",
                                url: basePath + "/app_task_progress/updateApp_task_progress",
                                data: that.ruleForm,
                                success: function (res) {
                                    if (res.status == 0) {
                                        that.addNewCustomer = false;
                                        that.handleCurrentChange(1);
                                    }
                                }
                            })
                        }
                    } else {
                        console.log('error submit!!');
                        return false;
                    }
                });
            },
            changeSearchFlag() {
                this.topSearchFlag = false;
            },
            handleCurrentChange(val) {
                this.loading = true;
                this.soMoreUserIpt.currentPage = val;
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/app_task_progress/queryPageApp_task_progressKeyList`,
                    data: that.soMoreUserIpt,
                    success: function (data) {
                        that.cusTableLstInit = data.rows;
                        that.pageInit.totalResult = data.total;
                        that.pageInit.currentPage = val;
                        that.loading = false;
                    }
                })
            },
            del(row) {
                var that = this;
                that.$confirm("确认删除该信息!", "提示", {
                    confirmButtonText: "确定",
                    cancelButtonText: "取消",
                    type: "warning"
                }).then(() => {
                    $.ajax({
                        type: "GET",
                        url: `${basePath}/app_task_progress/deleteApp_task_progress`,
                        data: {id: row.id},
                        success: function (data) {
                            if (data.status == 0) {
                                that.$message({
                                    type: "success",
                                    message: "删除成功"
                                });
                                that.handleCurrentChange(1);
                            }
                        }
                    })
                }).catch(() => {
                    this.$message({
                        type: "info",
                        message: "已取消删除"
                    });
                });
            },
        }
    })
</script>
</html>
