<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--管理员管理界面-->
<head>
    <meta charset="utf-8">
    <meta content="width=device-width,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0"
          name="viewport">
    <title>管理员管理</title>
    <link href="../static/img/favicon.jpg" rel="shortcut icon">
    <!--css资源引用-->
    <link href="../static/element-ui/lib/theme-chalk/index.css" rel="stylesheet">
    <link href="../static/css/common.css" rel="stylesheet">
    <!--js资源引用-->
    <script type="text/javascript">
        var html = document.getElementsByTagName("html")[0];
        var w = document.documentElement.clientWidth || document.body.clientWidth;
        html.style.fontSize = w / 1366 + "px";
    </script>
    <script src="../static/js/vue.js"></script>
    <script src="../static/element-ui/lib/index.js"></script>
    <script src="../static/js/jquery-2.2.3.min.js"></script>
    <script src="../static/js/elementUI_icon.js"></script>
    <!--验证规则-->
    <script src="../static/js/elementui_validator.js"></script>
    <!--富文本资源文件-->
    <script charset="utf-8" src="../static/ueditor.config.js" type="text/javascript"></script>
    <script charset="utf-8" src="../static/ueditor.all.min.js" type="text/javascript"></script>
</head>
<body>
<div id="cus_IndexApp" v-cloak>
    <!--顶部搜索区功能按钮-->
    <div class="admin-page-toolbar">
        <el-button @click="add" class="table-button-add" icon="el-icon-circle-plus-outline" size="mini" v-if="name_add">
            新增
        </el-button>
        <el-select class="top_divR" clearable placeholder="请选择角色" size="mini"
                   v-model="soMoreUserIpt.role_manage_id">
            <el-option
                    :key="item.id"
                    :label="item.role_name"
                    :value="item.id"
                    v-for="item in classOptionsrole_manage_id">
            </el-option>
        </el-select>
        <el-select class="top_divR" clearable placeholder="账号状态" size="mini"
                   v-model="soMoreUserIpt.account_status">
            <el-option label="正常" value="1"></el-option>
            <el-option label="禁用" value="0"></el-option>
        </el-select>
        <el-button @click="handleCurrentChange(1)" class="table-button-search" icon="el-icon-search" size="mini"
                   v-if="name_query">搜索
        </el-button>
    </div>
    <!--列表数据展示区-->
    <div class="cusMTable">
        <el-table :data="cusTableLstInit" header-row-class-name="header-row-class-name" stripe style="width: 100%;">
            <el-table-column
                    label="主键"
                    prop="id">
            </el-table-column>
            <el-table-column
                    label="用户名"
                    prop="USERNAME">
            </el-table-column>
            <el-table-column
                    label="密码"
                    prop="PASSWORD">
            </el-table-column>
            <el-table-column
                    label="昵称"
                    prop="NAME">
            </el-table-column>
            <el-table-column
                    label="账号状态"
                    prop="account_status"
                    width="100">
                <template slot-scope="scope">
                    <el-tag type="success"
                            v-if="scope.row.account_status=='1' || scope.row.account_status==null || scope.row.account_status===''">正常</el-tag>
                    <el-tag type="danger" v-else>禁用</el-tag>
                </template>
            </el-table-column>
            <el-table-column
                    label="角色"
                    prop="role_manage_id">
                <template slot-scope="scope">
                    <el-tag type="success">{{scope.row.role_manage_id_role_name1}}</el-tag>
                </template>
            </el-table-column>
            <el-table-column
                    label="建立时间"
                    prop="create_time">
            </el-table-column>
            <el-table-column
                    label="更新时间"
                    prop="update_time">
            </el-table-column>
            <el-table-column
                    label="备注(可为空)"
                    prop="signature">
            </el-table-column>
            <el-table-column fixed="right" label="操作" min-width="300" width="360">
                <template slot-scope="scope">
                    <div class="operation-buttons">
                        <el-button @click="view(scope.row)" class="table-button-view operation-btn" icon="el-icon-view" size="mini">
                            查看
                        </el-button>
                        <el-button @click="edit(scope.row)" class="table-button-edit operation-btn" icon="el-icon-edit" size="mini"
                                   v-if="name_edit">编辑
                        </el-button>
                        <el-button @click="del(scope.row)" class="table-button-delete operation-btn" icon="el-icon-delete" size="mini"
                                   v-if="name_delete">删除
                        </el-button>
                        <template v-if="isSysAdmin">
                            <el-button @click="disableAcc(scope.row)" type="warning" size="mini" class="operation-btn"
                                       v-if="scope.row.account_status!='0'">禁用</el-button>
                            <el-button @click="enableAcc(scope.row)" type="success" size="mini" class="operation-btn"
                                       v-if="scope.row.account_status=='0'">启用</el-button>
                            <el-button @click="resetPwd(scope.row)" type="info" size="mini" class="operation-btn">重置密码</el-button>
                        </template>
                    </div>
                </template>
            </el-table-column>
        </el-table>
        <div style="text-align:right;">
            <el-pagination :current-page="pageInit.currentPage" :page-size="10" :total="pageInit.totalResult"
                           @current-change="handleCurrentChange" layout="total, prev, pager, next, jumper">
            </el-pagination>
        </div>
    </div>
    <!--新增、编辑、详情dialog界面-->
    <el-dialog :title="titleName" :visible.sync="addNewCustomer" top="5vh" width="60%">
        <el-form :disabled="viewDisabled" :model="ruleForm" :rules="rules" class="demo-ruleForm" label-width="100px"
                 ref="ruleForm">
            <el-form-item label="用户名" prop="USERNAME">
                <el-input v-model="ruleForm.USERNAME"></el-input>
            </el-form-item>
            <el-form-item label="密码" prop="PASSWORD">
                <el-input v-model="ruleForm.PASSWORD"></el-input>
            </el-form-item>
            <el-form-item label="昵称" prop="NAME">
                <el-input v-model="ruleForm.NAME"></el-input>
            </el-form-item>
            <el-form-item label="角色" prop="role_manage_id">
                <!--下拉框-->
                <div>
                    <el-select placeholder="请选择角色" v-model="ruleForm.role_manage_id">
                        <el-option :key="item.id" :label="item.role_name" :value="item.id"
                                   v-for="item in classOptionsrole_manage_id"></el-option>
                    </el-select>
                </div>
            </el-form-item>
            <el-form-item label="备注(可为空)" prop="signature">
                <el-input v-model="ruleForm.signature"></el-input>
            </el-form-item>
            <el-form-item v-if="!viewDisabled">
                <el-button @click="submitForm" style="margin-left:35%" type="primary">立即保存</el-button>
            </el-form-item>
        </el-form>
    </el-dialog>
</div>
</body>
<script th:inline="javascript">
    var test_detailsue = null;
    var test_detailsue;
    var ue = null;
    var basePath = "/" + window.location.pathname.split("/")[1];
    let app = window.parent.App;
    <!--使用vue-->
    new Vue({
        el: "#cus_IndexApp",
        <!--初始化 data -->
        data() {
            return {
                pageInit: {
                    currentPage: 1,
                },
                cusTableLstInit: [],
                soMoreUserIpt: {},
                addNewCustomer: false,
                ruleForm: {},
                rules: {
                    id: [
                        {required: false, message: '请填写主键', trigger: 'blur'}
                    ],
                    USERNAME: [
                        {required: false, message: '请填写用户名', trigger: 'blur'}
                    ],
                    PASSWORD: [
                        {required: false, message: '请填写密码', trigger: 'blur'}
                    ],
                    NAME: [
                        {required: false, message: '请填写昵称', trigger: 'blur'}
                    ],
                    role_manage_id: [
                        {required: false, message: '请填写角色', trigger: 'change'}
                    ],
                    create_time: [
                        {required: false, message: '请填写建立时间', trigger: 'blur'}
                    ],
                    update_time: [
                        {required: false, message: '请填写更新时间', trigger: 'blur'}
                    ],
                    signature: [
                        {required: false, message: '请填写备注(可为空)', trigger: 'blur'}
                    ],
                },
                viewDisabled: false,
                titleName: "新增",
                classOptionsrole_manage_id: [],
                classOptions: [],
                userObj: [],
                name_add: false,//新增权限
                name_edit: false,//编辑权限
                name_delete: false,//删除权限
                name_query: false,//查询权限
                isSysAdmin: false,
                tenantList: [],
                uploadUrl: basePath,
                iconList: iconList,
            }
        },
        <!--初始化 mounted -->
        mounted() {
            this.userObj = JSON.parse(localStorage.getItem("userInfo"));
            this.isSysAdmin = String(this.userObj.role_manage_id) === '1';
            this.getUserBtnList(this.userObj.role_manage_id);//调用获取权限按钮
            this.handleCurrentChange(1);
            this.getClassOptionsrole_manage_id();
        },
        <!--初始化 methods -->
        methods: {
//获取权限按钮方法
            getUserBtnList(role_manage_id) {
                var pram = new URLSearchParams('?' + window.location.href.split('?')[1]);
                var child_menu_id = pram.get('child_menu_id');
                let that = this;
//ajax发送请求
                $.ajax({
                    type: "GET",
                    url: basePath + "/permission_menu/queryPermission_menuKey",
                    data: {role_manage_id: role_manage_id, child_menu_id: child_menu_id},
                    success: function (res) {
                        let childMenu = res.data[0];
                        that.name_add = childMenu.name_add == '1'//新增权限
                        that.name_edit = childMenu.name_edit == '1'//编辑权限
                        that.name_delete = childMenu.name_delete == '1'//删除权限
                        that.name_query = childMenu.name_query == '1'//查询权限
                    }
                })
            },
            windowOpen(url) {
                window.open(url);
            },
            view(row) {
                this.titleName = "详情";
                this.ruleForm = row;
                this.viewDisabled = true;
                this.addNewCustomer = true;
                this.ruleForm.role_manage_id = Number(row.role_manage_id);
            },
            add() {
                this.titleName = "新增";
                this.addNewCustomer = true;
                this.viewDisabled = false;
            },
            edit(row) {
                this.titleName = "编辑";
                this.ruleForm = row;
                this.addNewCustomer = true;
                this.viewDisabled = false;
                this.ruleForm.role_manage_id = Number(row.role_manage_id);
            },
            getClassOptionsrole_manage_id() {
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/role_manage/queryRole_manageKey`,
                    data: {},
                    success: function (data) {
                        var raw = data.data || [];
                        that.classOptionsrole_manage_id = raw.filter(function (x) {
                            return String(x.id) !== '3';
                        });
                    }
                })
            },
            submitForm() {
                let that = this;
                this.$refs.ruleForm.validate((valid) => {
                    if (valid) {
                        if (this.titleName == "新增") {
                            $.ajax({
                                type: "POST",
                                url: basePath + "/sys_user/addSys_userNo",
                                data: that.ruleForm,
                                success: function (res) {
                                    console.log(res);
                                    if (res.status == 0) {
                                        that.addNewCustomer = false;
                                        that.handleCurrentChange(1);
                                    }
                                }
                            })
                        } else if (this.titleName == "编辑") {
                            $.ajax({
                                type: "POST",
                                url: basePath + "/sys_user/updateSys_user",
                                data: that.ruleForm,
                                success: function (res) {
                                    if (res.status == 0) {
                                        that.addNewCustomer = false;
                                        that.handleCurrentChange(1);
                                    }
                                }
                            })
                        }
                    } else {
                        console.log('error submit!!');
                        return false;
                    }
                });
            },
            changeSearchFlag() {
                this.topSearchFlag = false;
            },
            handleCurrentChange(val) {
                this.loading = true;
                this.soMoreUserIpt.currentPage = val;
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/sys_user/queryPageSys_userKeyList`,
                    data: that.soMoreUserIpt,
                    success: function (data) {
                        that.cusTableLstInit = data.rows;
                        that.pageInit.totalResult = data.total;
                        that.pageInit.currentPage = val;
                        that.loading = false;
                    }
                })
            },
            disableAcc(row) {
                let that = this;
                $.ajax({
                    type: "POST",
                    url: basePath + "/sys_user/setAccountStatus",
                    data: {id: row.id, account_status: '0'},
                    success: function (res) {
                        if (res.status == 0) {
                            that.$message.success('已禁用');
                            that.handleCurrentChange(that.pageInit.currentPage || 1);
                        } else {
                            that.$message.error(res.msg || '操作失败');
                        }
                    }
                });
            },
            enableAcc(row) {
                let that = this;
                $.ajax({
                    type: "POST",
                    url: basePath + "/sys_user/setAccountStatus",
                    data: {id: row.id, account_status: '1'},
                    success: function (res) {
                        if (res.status == 0) {
                            that.$message.success('已启用');
                            that.handleCurrentChange(that.pageInit.currentPage || 1);
                        } else {
                            that.$message.error(res.msg || '操作失败');
                        }
                    }
                });
            },
            resetPwd(row) {
                let that = this;
                this.$prompt('请输入新密码', '重置密码', {
                    confirmButtonText: '确定',
                    cancelButtonText: '取消',
                    inputPattern: /.+/,
                    inputErrorMessage: '密码不能为空'
                }).then(function (r) {
                    $.ajax({
                        type: "POST",
                        url: basePath + "/sys_user/adminResetPassword",
                        data: {id: row.id, PASSWORD: r.value},
                        success: function (res) {
                            if (res.status == 0) {
                                that.$message.success('密码已重置');
                            } else {
                                that.$message.error(res.msg || '失败');
                            }
                        }
                    });
                }).catch(function () {
                });
            },
            del(row) {
                var that = this;
                that.$confirm("确认删除该信息!", "提示", {
                    confirmButtonText: "确定",
                    cancelButtonText: "取消",
                    type: "warning"
                }).then(() => {
                    $.ajax({
                        type: "GET",
                        url: `${basePath}/sys_user/deleteSys_user`,
                        data: {id: row.id},
                        success: function (data) {
                            if (data.status == 0) {
                                that.$message({
                                    type: "success",
                                    message: "删除成功"
                                });
                                that.handleCurrentChange(1);
                            }
                        }
                    })
                }).catch(() => {
                    this.$message({
                        type: "info",
                        message: "已取消删除"
                    });
                });
            },
        }
    })
</script>
</html>
