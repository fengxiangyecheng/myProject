<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--团队日程留言交互管理界面-->
<head>
    <meta charset="utf-8">
    <meta name="viewport"
          content="width=device-width,user-scalable=no,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0">
    <title>团队日程留言交互管理</title>
    <link rel="shortcut icon" href="../static/img/favicon.jpg">
    <!--css资源引用-->
    <link rel="stylesheet" href="../static/element-ui/lib/theme-chalk/index.css">
    <link rel="stylesheet" href="../static/css/common.css">
    <!--js资源引用-->
    <script type="text/javascript">
        var html = document.getElementsByTagName("html")[0];
        var w = document.documentElement.clientWidth || document.body.clientWidth;
        html.style.fontSize = w / 1366 + "px";
    </script>
    <script src="../static/js/vue.js"></script>
    <script src="../static/element-ui/lib/index.js"></script>
    <script src="../static/js/jquery-2.2.3.min.js"></script>
    <script src="../static/js/elementUI_icon.js"></script>
    <!--验证规则-->
    <script src="../static/js/elementui_validator.js"></script>
    <!--富文本资源文件-->
    <script type="text/javascript" charset="utf-8" src="../static/ueditor.config.js"></script>
    <script type="text/javascript" charset="utf-8" src="../static/ueditor.all.min.js"></script>
</head>
<body>
<div id="cus_IndexApp" v-cloak>
    <!--顶部搜索区功能按钮-->
    <div class="admin-page-toolbar">
        <el-button size="mini" @click="add" v-if="name_add" icon="el-icon-circle-plus-outline" class="table-button-add">
            新增
        </el-button>
        <el-select placeholder="请选择日程ID" v-model="soMoreUserIpt.schedule_id" size="mini" class="top_divR"
                   clearable>
            <el-option
                    v-for="item in classOptionsschedule_id"
                    :key="item.id"
                    :label="item.title"
                    :value="item.id">
            </el-option>
        </el-select>
        <el-select placeholder="筛选留言人（前台用户）" v-model="soMoreUserIpt.user_id" size="mini" class="top_divR" clearable>
            <el-option
                    v-for="item in classOptionsuser_id"
                    :key="item.id"
                    :label="(item.nickname || item.username || '') + (item.username ? '（' + item.username + '）' : '')"
                    :value="item.id">
            </el-option>
        </el-select>
        <el-button size="mini" @click="handleCurrentChange(1)" v-if="name_query" icon="el-icon-search"
                   class="table-button-search">搜索
        </el-button>
    </div>
    <!--列表数据展示区-->
    <div class="cusMTable">
        <el-table :data="cusTableLstInit" style="width: 100%;" stripe header-row-class-name="header-row-class-name">
            <el-table-column
                    prop="id"
                    label="主键id">
            </el-table-column>
            <el-table-column
                    prop="schedule_id"
                    label="日程ID">
                <template slot-scope="scope">
                    <el-tag type="success">{{scope.row.schedule_id_title1}}</el-tag>
                </template>
            </el-table-column>
            <el-table-column
                    prop="user_id"
                    label="留言人">
                <template slot-scope="scope">
                    <el-tag type="success">{{scope.row.user_id_USERNAME1}}</el-tag>
                </template>
            </el-table-column>
            <el-table-column
                    prop="parent_id"
                    label="回复关系"
                    min-width="220">
                <template slot-scope="scope">
                    <span v-if="!scope.row.parent_id || scope.row.parent_id === '0' || scope.row.parent_id === 0">顶层留言</span>
                    <div v-else style="line-height:1.4;">
                        <div style="color:#606266;font-size:12px;">回复 {{ scope.row.parent_id_author_name1 || ('#' + scope.row.parent_id) }}</div>
                        <div style="color:#909399;font-size:12px;max-height:40px;overflow:hidden;">{{ parentReplySnippet(scope.row.parent_id_content1) }}</div>
                    </div>
                </template>
            </el-table-column>
            <el-table-column
                    prop="create_time"
                    label="留言时间">
            </el-table-column>
            <el-table-column fixed="right" label="操作" min-width="190" width="230">
                <template slot-scope="scope">
                    <div class="operation-buttons">
                        <el-button @click="view(scope.row)" class="table-button-view operation-btn" icon="el-icon-view" size="mini">
                            查看
                        </el-button>
                        <el-button @click="edit(scope.row)" class="table-button-edit operation-btn" icon="el-icon-edit" size="mini"
                                   v-if="name_edit">编辑
                        </el-button>
                        <el-button @click="del(scope.row)" class="table-button-delete operation-btn" icon="el-icon-delete" size="mini"
                                   v-if="name_delete">删除
                        </el-button>
                    </div>
                </template>
            </el-table-column>
        </el-table>
        <div style="text-align:right;">
            <el-pagination @current-change="handleCurrentChange" :current-page="pageInit.currentPage" :page-size="10"
                           layout="total, prev, pager, next, jumper" :total="pageInit.totalResult">
            </el-pagination>
        </div>
    </div>
    <!--新增、编辑、详情dialog界面-->
    <el-dialog :title="titleName" :visible.sync="addNewCustomer" width="60%" top="5vh">
        <el-form :model="ruleForm" ref="ruleForm" label-width="100px" class="demo-ruleForm" :rules="rules"
                 :disabled="viewDisabled">
            <el-form-item label="日程ID" prop="schedule_id">
                <!--单选框-->
                <div>
                    <el-radio-group v-model="ruleForm.schedule_id">
                        <el-radio :label="item.id" v-for="item in classOptionsschedule_id" :key="item.id">
                            {{item.title}}
                        </el-radio>
                    </el-radio-group>
                </div>
            </el-form-item>
            <el-form-item label="留言人" prop="user_id">
                <template v-if="titleName === '新增'">
                    <div>{{ loginCommenterLabel }}</div>
                    <div v-if="canProxyDelegator" style="margin-top:10px;">
                        <el-select v-model="ruleForm.delegate_user_id" clearable filterable
                                   placeholder="代发为前台用户（选填，不选则为本人）" size="small" style="width:100%;">
                            <el-option
                                    v-for="item in classOptionsuser_id"
                                    :key="item.id"
                                    :label="(item.nickname || item.username || '') + (item.username ? '（' + item.username + '）' : '')"
                                    :value="item.id">
                            </el-option>
                        </el-select>
                        <div style="color:#909399;font-size:12px;margin-top:6px;">仅系统管理员与团队管理员可代发；团队管理员仅限其管理范围内的日程</div>
                    </div>
                    <span v-else style="color:#909399;font-size:12px;">（默认使用当前登录账号）</span>
                </template>
                <template v-else-if="titleName === '编辑' && canProxyDelegator">
                    <el-select v-model="ruleForm.user_id" clearable filterable placeholder="请选择留言人" size="small" style="width:100%;">
                        <el-option
                                v-for="item in classOptionsuser_id"
                                :key="item.id"
                                :label="(item.nickname || item.username || '') + (item.username ? '（' + item.username + '）' : '')"
                                :value="item.id">
                        </el-option>
                    </el-select>
                </template>
                <template v-else>
                    <span>{{ ruleForm.user_id_USERNAME1 || ('用户ID:' + (ruleForm.user_id != null ? ruleForm.user_id : '')) }}</span>
                </template>
            </el-form-item>
            <el-form-item label="留言内容" prop="content">
                <el-input type="textarea" v-model="ruleForm.content" :maxlength="500" auto></el-input>
            </el-form-item>
            <!-- 新增/编辑：先选日程，再选回复哪条；parent_id 由下拉绑定，无需手填数字 -->
            <el-form-item label="回复哪条留言" prop="parent_id" v-if="!viewDisabled && (titleName === '新增' || titleName === '编辑')">
                <el-select v-model="ruleForm.parent_id" filterable
                           :placeholder="ruleForm.schedule_id ? '选择要回复的留言，或选顶层新帖' : '请先选择上方日程'"
                           style="width:100%;" size="small">
                    <el-option label="顶层新帖（不回复既有留言）" value="0"></el-option>
                    <el-option
                            v-for="c in scheduleCommentOptions"
                            :key="c.id"
                            :label="parentOptionLabel(c)"
                            :value="String(c.id)">
                    </el-option>
                </el-select>
<!--                <div style="color:#909399;font-size:12px;margin-top:6px;line-height:1.5;">-->
<!--                    先选「日程」，系统会列出该日程下已有留言；选中某条即表示<strong>回复</strong>该条（写入父留言ID）。选「顶层新帖」表示新开一条、不挂在某条回复下。-->
<!--                </div>-->
            </el-form-item>
            <el-form-item label="回复关系" v-else-if="titleName === '详情'">
                <div v-if="!ruleForm.parent_id || ruleForm.parent_id === '0' || ruleForm.parent_id === 0">顶层留言（非回复）</div>
                <div v-else style="line-height:1.6;">
                    <div><span style="color:#909399;">被回复人：</span>{{ ruleForm.parent_id_author_name1 || '—' }}</div>
                    <div style="margin-top:6px;"><span style="color:#909399;">原留言内容：</span></div>
                    <div style="margin-top:4px;padding:8px;background:#f5f7fa;border-radius:4px;white-space:pre-wrap;word-break:break-word;">{{ ruleForm.parent_id_content1 || ('（未查到父留言，parent_id=' + ruleForm.parent_id + '）') }}</div>
                </div>
            </el-form-item>
            <el-form-item v-if="!viewDisabled">
                <el-button type="primary" style="margin-left:35%" @click="submitForm">立即保存</el-button>
            </el-form-item>
        </el-form>
    </el-dialog>
</div>
</body>
<script th:inline="javascript">
    var test_detailsue = null;
    var test_detailsue;
    var ue = null;
    var basePath = "/" + window.location.pathname.split("/")[1];
    let app = window.parent.App;
    <!--使用vue-->
    new Vue({
        el: "#cus_IndexApp",
        <!--初始化 data -->
        data() {
            return {
                pageInit: {
                    currentPage: 1,
                },
                cusTableLstInit: [],
                soMoreUserIpt: {},
                addNewCustomer: false,
                ruleForm: {},
                rules: {
                    id: [
                        {required: false, message: '请填写主键id', trigger: 'blur'}
                    ],
                    schedule_id: [
                        {required: false, message: '请填写日程ID', trigger: 'change'}
                    ],
                    user_id: [
                        {required: false, message: '请填写留言人ID', trigger: 'change'}
                    ],
                    content: [
                        {required: false, message: '请填写留言内容', trigger: 'blur'}
                    ],
                    parent_id: [
                        {required: false, message: '请填写父留言ID（回复留言时使用）', trigger: 'blur'}
                    ],
                    create_time: [
                        {required: false, message: '请填写留言时间', trigger: 'blur'}
                    ],
                },
                viewDisabled: false,
                titleName: "新增",
                classOptionsschedule_id: [],
                classOptionsuser_id: [],
                classOptions: [],
                userObj: [],
                name_add: false,//新增权限
                name_edit: false,//编辑权限
                name_delete: false,//删除权限
                name_query: false,//查询权限
                tenantList: [],
                uploadUrl: basePath,
                iconList: iconList,
                /** 当前所选日程下、可选作「父留言」的列表（不含编辑中的本条，避免自引用） */
                scheduleCommentOptions: [],
            }
        },
        watch: {
            'ruleForm.schedule_id': function (nv, ov) {
                if (this.viewDisabled || this.titleName === '详情') {
                    return;
                }
                if (this.titleName === '新增') {
                    this.ruleForm.parent_id = '0';
                } else if (this.titleName === '编辑' && ov != null && nv !== ov) {
                    this.ruleForm.parent_id = '0';
                }
                this.refreshScheduleCommentsForParent(nv);
            }
        },
        computed: {
            loginCommenterLabel() {
                var u = this.userObj || {};
                var name = u.NAME || u.name;
                var account = u.USERNAME || u.username;
                if (name && account) {
                    return String(name) + '（' + String(account) + '）';
                }
                return name || account || (u.id != null && u.id !== '' ? '用户ID:' + u.id : '未登录');
            },
            /** 系统管理员(1)、团队管理员角色(2) 显示代发入口；是否允许代发本条日程由后端按团队校验 */
            canProxyDelegator() {
                var u = this.userObj || {};
                var r = u.role_manage_id;
                return r === '1' || r === 1 || r === '2' || r === 2;
            }
        },
        <!--初始化 mounted -->
        mounted() {
            try {
                this.userObj = JSON.parse(localStorage.getItem("userInfo") || "{}");
            } catch (e) {
                this.userObj = {};
            }
            this.getUserBtnList(this.userObj.role_manage_id);//调用获取权限按钮
            this.handleCurrentChange(1);
            this.getClassOptionsschedule_id();
            this.getClassOptionsuser_id();
        },
        <!--初始化 methods -->
        methods: {
//获取权限按钮方法
            getUserBtnList(role_manage_id) {
                var pram = new URLSearchParams('?' + window.location.href.split('?')[1]);
                var child_menu_id = pram.get('child_menu_id');
                let that = this;
//ajax发送请求
                $.ajax({
                    type: "GET",
                    url: basePath + "/permission_menu/queryPermission_menuKey",
                    data: {role_manage_id: role_manage_id, child_menu_id: child_menu_id},
                    success: function (res) {
                        let childMenu = res.data[0];
                        that.name_add = childMenu.name_add == '1'//新增权限
                        that.name_edit = childMenu.name_edit == '1'//编辑权限
                        that.name_delete = childMenu.name_delete == '1'//删除权限
                        that.name_query = childMenu.name_query == '1'//查询权限
                    }
                })
            },
            windowOpen(url) {
                window.open(url);
            },
            view(row) {
                this.titleName = "详情";
                this.ruleForm = Object.assign({}, row);
                this.viewDisabled = true;
                this.addNewCustomer = true;
                this.ruleForm.schedule_id = Number(row.schedule_id);
                this.ruleForm.user_id = Number(row.user_id);
                this.ruleForm.parent_id = (row.parent_id != null && row.parent_id !== '') ? String(row.parent_id) : '0';
            },
            add() {
                this.titleName = "新增";
                this.viewDisabled = false;
                this.scheduleCommentOptions = [];
                this.ruleForm = { schedule_id: '', content: '', parent_id: '0', delegate_user_id: '' };
                this.addNewCustomer = true;
            },
            edit(row) {
                this.titleName = "编辑";
                this.ruleForm = Object.assign({}, row);
                this.addNewCustomer = true;
                this.viewDisabled = false;
                this.ruleForm.schedule_id = Number(row.schedule_id);
                this.ruleForm.user_id = Number(row.user_id);
                this.ruleForm.parent_id = (row.parent_id != null && row.parent_id !== '') ? String(row.parent_id) : '0';
                var that = this;
                this.$nextTick(function () {
                    that.refreshScheduleCommentsForParent(that.ruleForm.schedule_id);
                });
            },
            parentOptionLabel(c) {
                var t = (c.content || '').replace(/\s+/g, ' ');
                if (t.length > 36) {
                    t = t.slice(0, 36) + '…';
                }
                return '#' + c.id + '　' + t + '　' + (c.create_time || '');
            },
            parentReplySnippet(text) {
                if (!text) {
                    return '—';
                }
                var s = String(text).replace(/\s+/g, ' ');
                return s.length > 48 ? s.slice(0, 48) + '…' : s;
            },
            refreshScheduleCommentsForParent(scheduleId) {
                var that = this;
                if (scheduleId === '' || scheduleId === null || scheduleId === undefined) {
                    that.scheduleCommentOptions = [];
                    return;
                }
                $.ajax({
                    type: "GET",
                    url: basePath + "/app_schedule_comment/queryApp_schedule_commentKey",
                    data: { schedule_id: scheduleId },
                    dataType: "json",
                    success: function (res) {
                        var rows = (res && res.status === 0 && res.data) ? res.data : [];
                        var curId = that.ruleForm && that.ruleForm.id != null ? String(that.ruleForm.id) : null;
                        if (curId) {
                            rows = rows.filter(function (r) {
                                return String(r.id) !== curId;
                            });
                        }
                        that.scheduleCommentOptions = rows;
                    },
                    error: function () {
                        that.scheduleCommentOptions = [];
                    }
                });
            },
            getClassOptionsschedule_id() {
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/app_team_schedule/queryApp_team_scheduleKey`,
                    data: {},
                    success: function (data) {
                        that.classOptionsschedule_id = data.data;
                    }
                })
            },
            getClassOptionsuser_id() {
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/app_user/queryApp_userKey`,
                    data: {},
                    success: function (data) {
                        that.classOptionsuser_id = (data && data.data) ? data.data : [];
                    }
                })
            },
            scheduleCommentAjaxError(xhr) {
                var msg = '网络或服务器错误';
                if (!xhr) {
                    return msg;
                }
                if (xhr.status === 0) {
                    msg = '网络中断或请求被取消';
                } else if (xhr.responseJSON && xhr.responseJSON.msg) {
                    msg = xhr.responseJSON.msg;
                } else if (xhr.responseText) {
                    try {
                        var j = JSON.parse(xhr.responseText);
                        if (j && j.msg) {
                            msg = j.msg;
                        }
                    } catch (e) {
                        if (xhr.status >= 500) {
                            msg = '服务器异常(' + xhr.status + ')，可能为字段超长或数据格式问题';
                        } else {
                            msg = '请求失败(' + xhr.status + ')';
                        }
                    }
                }
                return msg;
            },
            /** 与后端 PageData 一致，全部按字符串提交，避免 jQuery 序列化数字/对象异常 */
            strParam(v) {
                if (v === null || v === undefined) {
                    return '';
                }
                return String(v);
            },
            submitForm() {
                let that = this;
                this.$refs.ruleForm.validate((valid) => {
                    if (valid) {
                        if (this.titleName == "新增") {
                            var addData = {
                                schedule_id: that.strParam(that.ruleForm.schedule_id),
                                content: that.strParam(that.ruleForm.content),
                                parent_id: (that.ruleForm.parent_id !== '' && that.ruleForm.parent_id != null) ? that.strParam(that.ruleForm.parent_id) : '0'
                            };
                            if (that.canProxyDelegator && that.ruleForm.delegate_user_id !== '' && that.ruleForm.delegate_user_id != null) {
                                addData.user_id = that.strParam(that.ruleForm.delegate_user_id);
                            }
                            $.ajax({
                                type: "POST",
                                url: basePath + "/app_schedule_comment/addApp_schedule_commentNo",
                                data: addData,
                                dataType: "json",
                                success: function (res) {
                                    if (res && (res.status === 0 || res.status === '0')) {
                                        that.$message.success(res.msg || '保存成功');
                                        that.addNewCustomer = false;
                                        that.handleCurrentChange(1);
                                    } else {
                                        that.$message.error((res && res.msg) ? res.msg : '保存失败');
                                    }
                                },
                                error: function (xhr) {
                                    that.$message.error(that.scheduleCommentAjaxError(xhr));
                                }
                            })
                        } else if (this.titleName == "编辑") {
                            // 勿提交整行表格数据（含 JOIN 字段），避免参数污染、序列化异常；失败时 status 非 0 弹窗不会关
                            var editData = {
                                id: that.strParam(that.ruleForm.id),
                                schedule_id: that.strParam(that.ruleForm.schedule_id),
                                user_id: that.strParam(that.ruleForm.user_id),
                                content: that.strParam(that.ruleForm.content),
                                parent_id: (that.ruleForm.parent_id !== '' && that.ruleForm.parent_id != null) ? that.strParam(that.ruleForm.parent_id) : '0'
                            };
                            $.ajax({
                                type: "POST",
                                url: basePath + "/app_schedule_comment/updateApp_schedule_comment",
                                data: editData,
                                dataType: "json",
                                success: function (res) {
                                    if (res && (res.status === 0 || res.status === '0')) {
                                        that.$message.success(res.msg || '保存成功');
                                        that.addNewCustomer = false;
                                        that.handleCurrentChange(that.pageInit.currentPage || 1);
                                    } else {
                                        that.$message.error((res && res.msg) ? res.msg : '保存失败');
                                    }
                                },
                                error: function (xhr) {
                                    that.$message.error(that.scheduleCommentAjaxError(xhr));
                                }
                            })
                        }
                    } else {
                        console.log('error submit!!');
                        return false;
                    }
                });
            },
            changeSearchFlag() {
                this.topSearchFlag = false;
            },
            handleCurrentChange(val) {
                this.loading = true;
                this.soMoreUserIpt.currentPage = val;
                let that = this;
                $.ajax({
                    type: "GET",
                    url: `${basePath}/app_schedule_comment/queryPageApp_schedule_commentKeyList`,
                    data: that.soMoreUserIpt,
                    dataType: "json",
                    success: function (data) {
                        if (data && data.rows) {
                            that.cusTableLstInit = data.rows;
                            that.pageInit.totalResult = data.total;
                            that.pageInit.currentPage = val;
                        }
                        that.loading = false;
                    },
                    error: function (xhr) {
                        that.loading = false;
                        that.$message.error(that.scheduleCommentAjaxError(xhr));
                    }
                })
            },
            del(row) {
                var that = this;
                that.$confirm("确认删除该信息!", "提示", {
                    confirmButtonText: "确定",
                    cancelButtonText: "取消",
                    type: "warning"
                }).then(() => {
                    $.ajax({
                        type: "GET",
                        url: `${basePath}/app_schedule_comment/deleteApp_schedule_comment`,
                        data: {id: row.id},
                        dataType: "json",
                        success: function (data) {
                            if (data && (data.status === 0 || data.status === '0')) {
                                that.$message({ type: "success", message: "删除成功" });
                                that.handleCurrentChange(that.pageInit.currentPage || 1);
                            } else {
                                that.$message.error((data && data.msg) ? data.msg : "删除失败");
                            }
                        },
                        error: function (xhr) {
                            that.$message.error(that.scheduleCommentAjaxError(xhr));
                        }
                    })
                }).catch(() => {
                    this.$message({
                        type: "info",
                        message: "已取消删除"
                    });
                });
            },
        }
    })
</script>
</html>
